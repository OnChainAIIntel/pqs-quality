name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          # Set PQS_API_KEY as a repo secret to run the live smoke tests
          # (#3 login-reject, #5 score JSON, #6 check). Without it, live
          # tests skip cleanly; #1, #2, #4 always run.
          PQS_API_KEY: ${{ secrets.PQS_API_KEY }}
